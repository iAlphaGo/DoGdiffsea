# model
IMAGE_SIZE : [256, 256]         # load image size, if it's train mode, it will be randomly cropped to IMAGE_SIZE. If it's test mode, it will be resized to IMAGE_SIZE.
CHANNEL_X : 3                   # input channel
CHANNEL_Y : 3                   # output channel
TIMESTEPS : 1000                # diffusion steps
SCHEDULE : 'linear'             # linear or cosine
MODEL_CHANNELS : 32             # basic channels of Unet
NUM_RESBLOCKS : 1               # number of residual blocks
CHANNEL_MULT : [1,2,3,4]        # channel multiplier of each layer
NUM_HEADS : 1
DPT_PRETRAINED_WEIGHT: 'autodl-tmp/SeaDiff-main/depth_anything_vitl14.pth'      # path of the pretrained weight of Depth Anything model
MODE : 1                        # 1 Train, 0 Test
PRE_ORI : 'True'                # if True, predict $x_0$, else predict $\epsilon$.

# VMD配置
USE_VMD: 'True'          # 是否使用VMD
NUM_VMD_MODES: 4         # VMD模态数
VMD_MODE: 'condition'    # VMD模式
HAVE_METRICS: true

# # 新增配置：禁用颜色和物理引导
# USE_COLOR_GUIDANCE: false  # 禁用颜色引导（直方图）
# USE_PHYSICAL_GUIDANCE: false  # 禁用物理引导（深度图）

# train
PATH_IMG : '/root/autodl-tmp/SeaDiff-main/euvp/train/input'                  # path of input
PATH_GT : '/root/autodl-tmp/SeaDiff-main/euvp/train/target'                   # path of ground truth
PATH_GT_DEPTH : '/root/autodl-tmp/SeaDiff-main/euvp/train/depth'             # path of depth
PATH_IMG_HIST: '/root/autodl-tmp/SeaDiff-main/euvp/train/histo'              # path of histogram
BATCH_SIZE : 3                  # training batch size
NUM_WORKERS : 0                 # number of workers
ITERATION_MAX : 400000          # max training iteration
LR : 0.0001                     # learning rate
LOSS : 'L2'                     # L1 or L2
EMA_EVERY : 100                 # update EMA every EMA_EVERY iterations
START_EMA : 2000                # start EMA after START_EMA iterations
SAVE_MODEL_EVERY : 5000        # save model every SAVE_MODEL_EVERY iterations
EMA: 'False'                    # if True, use EMA
CONTINUE_TRAINING : 'False'     # if True, continue training
CONTINUE_TRAINING_STEPS : 0       # continue training from CONTINUE_TRAINING_STEPS

PRETRAINED_PATH_BETA_PREDICTOR: '/root/autodl-tmp/SeaDiff-main/euvp_ckp/model_beta_predictor_340000.pth'
# PRETRAINED_PATH_DEPTH_ESTIMATOR : ''            
PRETRAINED_PATH_DENOISER: '/root/autodl-tmp/SeaDiff-main/euvp_ckp/model_denoiser_340000.pth'
WEIGHT_SAVE_PATH: '/root/autodl-tmp/SeaDiff-main/euvp_ckp/best_model.pth'

WEIGHT_SAVE_PATH : '/root/autodl-tmp/SeaDiff-main/euvp_ckp'          # path to save model
TRAIN_PATH : '/root/autodl-tmp/SeaDiff-main/euvp/train'                # path of training data
BETA_LOSS : 50                  # hyperparameter to balance the pixel loss and the diffusion loss
HIGH_LOW_FREQ : 'False'         # if True, training with frequency separation
OUTPUT_DIR: '/root/autodl-tmp/SeaDiff-main/outputs'

# test
NATIVE_RESOLUTION : 'False'      # if True, test with native resolution
DPM_SOLVER : 'False'             # if True, test with DPM_solver
DPM_STEP : 20                    # DPM_solver step
BATCH_SIZE_VAL : 1               # test batch size
PATH_TEST_IMG : '/root/autodl-tmp/SeaDiff-main/euvp/val/input'              # path of input
PATH_TEST_GT : '/root/autodl-tmp/SeaDiff-main/euvp/val/target'               # path of ground truth
PATH_TEST_GT_DEPTH : '/root/autodl-tmp/SeaDiff-main/euvp/val/depth'         # path of depth
PATH_TEST_IMG_HIST: '/root/autodl-tmp/SeaDiff-main/euvp/val/histo'          # path of histogram

TEST_PATH : '/root/autodl-tmp/SeaDiff-main/euvp/results'                  # path to save results
VIS_PATH: '/root/autodl-tmp/SeaDiff-main//euvp/vis'                    # path to save results

